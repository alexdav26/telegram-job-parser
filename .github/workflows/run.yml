name: Run Parser

on:
  workflow_dispatch:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: |
          pip install telethon

      - name: Проверка секретов
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          python - <<'PY'
          import os
          print("API_ID:", "OK" if os.getenv("API_ID") else "EMPTY")
          print("API_HASH:", "OK" if os.getenv("API_HASH") else "EMPTY")
          s = os.getenv("SESSION_STRING", "")
          print("SESSION_STRING:", "OK" if s else "EMPTY")
          print("SESSION_STRING_LEN:", len(s))
          PY

      - name: Запуск парсера
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: |
          python parser.py
